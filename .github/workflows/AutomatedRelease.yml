name: "Automated Release"

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      buildConfiguration:
        description: "Build Configuration"
        required: true
        default: "Release"
        type: choice
        options:
          - Release
          - Debug
      versionPreReleaseTag: # Use alpha, beta, or rc for pre-release. An empty string for stable.
        description: "Pre-Release Tag"
        required: true
        default: "alpha"
        type: choice
        options:
          - "alpha"
          - "beta"
          - "RC"
          - ""

env:
  projectName: SRTPluginProviderRE9
  baseFolderName: SRTPluginProviderRE9
  platform: x64
  configuration: ${{ github.event.inputs.buildConfiguration || 'Release' }}

jobs:
  setup:
    name: Setup Environment
    runs-on: windows-2025-vs2026

    outputs:
      verMajor: ${{steps.version-parts.outputs.version_major}}
      verMinor: ${{steps.version-parts.outputs.version_minor}}
      verPatch: ${{steps.version-parts.outputs.version_patch}}
      verPreReleaseTag: ${{steps.version-parts.outputs.version_prereltag}}
      verBuild: ${{steps.build-number.outputs.current_build_number}}
      verSHAHash: ${{steps.short-sha-hash.outputs.short_sha_hash}}
      verSemVerString: ${{steps.semver-string.outputs.semver_string}}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version parts
        id: version-parts
        run: |
          [string[]]$versionParts = (Get-Content -Path "version.txt" -Raw).Split('.');
          echo "version_major=$($versionParts[0])" >> $env:GITHUB_OUTPUT
          echo "version_minor=$($versionParts[1])" >> $env:GITHUB_OUTPUT
          echo "version_patch=$($versionParts[2])" >> $env:GITHUB_OUTPUT
          echo "version_prereltag=${{ github.event.inputs.versionPreReleaseTag || '' }}" >> $env:GITHUB_OUTPUT

      - name: Get new build number
        id: build-number
        run: |
          $build_number = $((${{ vars.BUILD_NUMBER }} + 1))
          echo "current_build_number=$build_number" >> $env:GITHUB_OUTPUT

      - name: Get short SHA hash
        id: short-sha-hash
        run: |
          $short_sha_hash = $(("${{ github.sha }}".substring(0, 7)))
          echo "short_sha_hash=$short_sha_hash" >> $env:GITHUB_OUTPUT

      - name: Get SemVer string
        id: semver-string
        run: |
          [string]$semver_string = "${{steps.version-parts.outputs.version_major}}.${{steps.version-parts.outputs.version_minor}}.${{steps.version-parts.outputs.version_patch}}";
          if (![string]::IsNullOrWhitespace("${{steps.version-parts.outputs.version_prereltag}}")) {
            $semver_string += "-${{steps.version-parts.outputs.version_prereltag}}";
          }
          $semver_string += "+${{steps.build-number.outputs.current_build_number}}";
          $semver_string += ".${{steps.short-sha-hash.outputs.short_sha_hash}}";
          echo "semver_string=$semver_string" >> $env:GITHUB_OUTPUT;

  build-csharp:
    name: "Build (C#)"
    runs-on: windows-2025-vs2026
    needs: setup
    env:
      working-directory: .
      project-name: SRTPluginProviderRE9

    steps:
      # Checkout latest code
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Create repo user folder for the dependencies
      - name: Create repo user folder
        run: New-Item -ItemType directory -Path ..\..\SpeedRunTool

      # Checkout latest dependencies code
      - name: Checkout SRTHost
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          path: SRTHost
          repository: SpeedRunTool/SRTHost

      # GITHUB_WORKSPACE pathing is ass. Move this directory down one level.
      - name: Move SRTHost down a folder to work with existing csproj pathing
        run: Move-Item -Path SRTHost -Destination ..\..\SpeedRunTool

      # Create repo user folder for the dependencies
      - name: Create repo user folder
        run: New-Item -ItemType directory -Path ..\..\Squirrelies

      # Checkout latest dependencies code
      - name: Checkout ProcessMemory
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          path: ProcessMemory
          repository: Squirrelies/ProcessMemory

      # GITHUB_WORKSPACE pathing is ass. Move this directory down one level.
      - name: Move ProcessMemory down a folder to work with existing csproj pathing
        run: Move-Item -Path ProcessMemory -Destination ..\..\Squirrelies

      - name: Set versioning environment variable
        run: |
          echo 'VERSION=${{needs.Setup.outputs.verSemVerString}}' >> $env:GITHUB_ENV
          echo 'FILEVERSION=${{needs.Setup.outputs.verMajor}}.${{needs.Setup.outputs.verMinor}}.${{needs.Setup.outputs.verPatch}}.${{needs.Setup.outputs.verBuild}}' >> $env:GITHUB_ENV
          echo 'ASSEMBLYVERSION=${{needs.Setup.outputs.verMajor}}.${{needs.Setup.outputs.verMinor}}.0.0' >> $env:GITHUB_ENV

      # Install .NET
      - name: Install .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
          dotnet-quality: "ga"

      # Compiles the plugin
      - name: Build
        run: |
          dotnet build "src/${{env.projectName}}/${{env.projectName}}.sln" /p:"Configuration=${{env.configuration}};Platform=${{env.platform}};VERSION=$env:VERSION;FILEVERSION=$env:FILEVERSION;ASSEMBLYVERSION=$env:ASSEMBLYVERSION"

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ArtifactsCsharp
          path: |
            src/${{env.projectName}}/bin/${{env.configuration}}/${{env.platform}}/net5.0/*

  build-cpp:
    name: "Build (C++)"
    runs-on: windows-2025-vs2026
    needs: setup
    env:
      VCPKG_ROOT: C:\vcpkg
      working-directory: src/SRTPluginRE9
      VCPKG_TARGET_TRIPLET: x64-windows-static
      RC_VERSION_MAJOR: ${{needs.Setup.outputs.verMajor}}
      RC_VERSION_MINOR: ${{needs.Setup.outputs.verMinor}}
      RC_VERSION_PATCH: ${{needs.Setup.outputs.verPatch}}
      RC_VERSION_BUILD: ${{needs.Setup.outputs.verBuild}}
      RC_VERSION_PRERELEASE_TAG: ${{needs.Setup.outputs.verPreReleaseTag}}
      RC_VERSION_BUILD_HASH: ${{needs.Setup.outputs.verSHAHash}}

    steps:
      - name: Print tool versions
        run: |
          cmake --version
          $($env:VCPKG_ROOT)
          . "$($env:VCPKG_ROOT)\vcpkg.exe" version

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bootstrap vcpkg
        run: |
          cd "$($env:VCPKG_ROOT)"
          git pull
          .\bootstrap-vcpkg.bat

      - name: Configure
        working-directory: ${{ env.working-directory }}
        run: cmake --preset "${{ env.configuration }}/Win/x64/MSVC"

      - name: Build
        working-directory: ${{ env.working-directory }}
        run: cmake --build --preset "${{ env.configuration }}/Win/x64/MSVC" --config ${{ env.configuration }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ArtifactsCpp
          path: |
            ${{ env.working-directory }}/bin/${{ env.configuration }}/Win/x64/MSVC/${{ env.configuration }}/SRTPluginRE9.dll
            ${{ env.working-directory }}/bin/${{ env.configuration }}/Win/x64/MSVC/${{ env.configuration }}/SRTPluginRE9.pdb
            ${{ env.working-directory }}/bin/${{ env.configuration }}/Win/x64/MSVC/${{ env.configuration }}/SRTPluginRE9.Injector.exe
            ${{ env.working-directory }}/bin/${{ env.configuration }}/Win/x64/MSVC/${{ env.configuration }}/SRTPluginRE9.Injector.pdb

  package:
    name: "Package"
    runs-on: windows-2025-vs2026
    needs: [setup, build-csharp, build-cpp]
    env:
      working-directory: .
      is-prerelease: true

    steps:
      # Checkout latest code
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v8

      # Zip the publish artifacts
      - name: Zip the publish artifacts
        run: |
          Add-Type -assembly 'System.IO.Compression'
          Add-Type -assembly 'System.IO.Compression.FileSystem'
          [System.IO.Compression.ZipArchive]$zipFile = [System.IO.Compression.ZipFile]::Open('${{env.projectName}}_${{needs.Setup.outputs.verSemVerString}}.zip', ([System.IO.Compression.ZipArchiveMode]::Create))
          [System.IO.Compression.ZipFileExtensions]::CreateEntryFromFile($zipFile, 'LICENSE', ('${{env.baseFolderName}}\' + 'LICENSE'))
          $filesToZip = (Get-ChildItem -Path ArtifactsCsharp -File -Recurse).FullName
          foreach ($fileToZip in $filesToZip) {
            $fileNameInZip = $fileToZip.Replace(($pwd.Path + '\ArtifactsCsharp\'),'')
            [System.IO.Compression.ZipFileExtensions]::CreateEntryFromFile($zipFile, $fileToZip, ('${{env.baseFolderName}}\' + $fileNameInZip))
          }
          $filesToZip = (Get-ChildItem -Path ArtifactsCpp -File -Recurse).FullName
          foreach ($fileToZip in $filesToZip) {
            $fileNameInZip = $fileToZip.Replace(($pwd.Path + '\ArtifactsCpp\'),'')
            [System.IO.Compression.ZipFileExtensions]::CreateEntryFromFile($zipFile, $fileToZip, ('${{env.baseFolderName}}\' + $fileNameInZip))
          }
          $zipFile.Dispose()

      # Pushes the release
      - name: Publish release
        uses: "marvinpinto/action-automatic-releases@latest"
        with:
          repo_token: "${{ secrets.GITHUB_TOKEN }}"
          automatic_release_tag: "latest"
          prerelease: ${{env.is-prerelease}}
          title: "Automated Build - v${{needs.Setup.outputs.verSemVerString}} Release"
          files: |
            ${{env.projectName}}_${{needs.Setup.outputs.verSemVerString}}.zip

  PostRun:
    name: Post-Run
    runs-on: windows-2025-vs2026
    needs: [setup, package]

    defaults:
      run:
        shell: pwsh

    steps:
      - name: Update build number variable
        env:
          GH_TOKEN: ${{ secrets.GH_VARIABLE_RW_TOKEN }}
        run: gh variable set BUILD_NUMBER -b${{needs.Setup.outputs.verBuild}}
